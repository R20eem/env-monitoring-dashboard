<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Social Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 30px auto;
      padding: 20px;
      background: #f7f7f7;
    }

    h1, h2, h3 {
      color: #222;
    }

    .box {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    input, textarea, select, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      background: #2d6cdf;
      color: white;
      border: none;
    }

    button:hover {
      background: #1f54b5;
    }

    .post {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 14px;
      background: #fff;
    }

    .meta {
      color: #666;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .comment {
      margin-left: 15px;
      padding: 8px;
      border-left: 3px solid #ddd;
      margin-top: 8px;
      background: #fafafa;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    pre {
      background: #111;
      color: #eee;
      padding: 10px;
      border-radius: 8px;
      overflow-x: auto;
    }

    .small-btn {
      width: auto;
      display: inline-block;
      margin-right: 8px;
      padding: 8px 12px;
    }

    .author-link {
      color: #2d6cdf;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Demo Social Page</h1>

  <div class="box">
    <h2>Login</h2>
    <select id="role">
      <option value="farmer">Farmer</option>
      <option value="researcher">Researcher</option>
    </select>

    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Password" />
    <input id="orgCode" type="text" placeholder="Org code (researcher only)" />

    <button onclick="loginUser()">Login</button>

    <h3>Saved Token</h3>
    <pre id="tokenBox"></pre>
  </div>

  <div class="box">
    <h2>Create Post</h2>
    <input id="postTitle" type="text" placeholder="Post title" />
    <textarea id="postContent" rows="4" placeholder="Write your post here..."></textarea>
    <button onclick="createPost()">Create Post</button>
  </div>

  <div class="box">
    <h2>Posts Feed</h2>
    <button onclick="loadPosts()">Load Posts</button>
    <div id="postsContainer"></div>
  </div>

  <div class="box">
    <h2>Profile Viewer</h2>
    <pre id="profileBox">Click on an author's name to load profile info.</pre>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:8000";
    const TOKEN_KEY = "demo_jwt_token";

    function setToken(token) {
      localStorage.setItem(TOKEN_KEY, token);
      showToken();
    }

    function getToken() {
      return localStorage.getItem(TOKEN_KEY);
    }

    function showToken() {
      document.getElementById("tokenBox").textContent = getToken() || "No token saved yet.";
    }

    async function loginUser() {
      const role = document.getElementById("role").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const orgCode = document.getElementById("orgCode").value;

      let url = "";
      let body = {};

      if (role === "farmer") {
        url = `${API_BASE}/auth/farmers/login`;
        body = { email, password };
      } else {
        url = `${API_BASE}/auth/researchers/login`;
        body = { email, org_code: orgCode, password };
      }

      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (res.ok) {
        setToken(data.access_token);
        alert("Login successful");
      } else {
        alert(data.detail || "Login failed");
      }
    }

    async function createPost() {
      const token = getToken();
      if (!token) {
        alert("Please log in first");
        return;
      }

      const title = document.getElementById("postTitle").value;
      const content = document.getElementById("postContent").value;

      const res = await fetch(`${API_BASE}/posts/`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({ title, content })
      });

      const data = await res.json();

      if (res.ok) {
        alert("Post created");
        document.getElementById("postTitle").value = "";
        document.getElementById("postContent").value = "";
        loadPosts();
      } else {
        alert(data.detail || "Failed to create post");
      }
    }

    async function loadPosts() {
      const res = await fetch(`${API_BASE}/posts/`);
      const posts = await res.json();

      const container = document.getElementById("postsContainer");
      container.innerHTML = "";

      if (!Array.isArray(posts) || posts.length === 0) {
        container.innerHTML = "<p>No posts yet.</p>";
        return;
      }

      posts.forEach(post => {
        const postDiv = document.createElement("div");
        postDiv.className = "post";

        postDiv.innerHTML = `
          <h3>${post.title}</h3>
          <div class="meta">
            Posted by
            <span class="author-link" onclick="loadProfile('${post.author_role}', ${post.author_id})">
              ${post.author_name}
            </span>
            (${post.author_role})
          </div>
          <p>${post.content}</p>
          <p><strong>Likes:</strong> <span id="likes-${post.id}">${post.likes_count}</span></p>
          <p><strong>Comments:</strong> ${post.comments_count}</p>

          <button class="small-btn" onclick="likePost(${post.id})">Like</button>
          <button class="small-btn" onclick="unlikePost(${post.id})">Unlike</button>

          <textarea id="comment-${post.id}" rows="2" placeholder="Write a comment..."></textarea>
          <button onclick="addComment(${post.id})">Add Comment</button>

          <div id="comments-${post.id}"></div>
          <button onclick="loadComments(${post.id})">Load Comments</button>
        `;

        container.appendChild(postDiv);
      });
    }

    async function likePost(postId) {
      const token = getToken();
      if (!token) {
        alert("Please log in first");
        return;
      }

      const res = await fetch(`${API_BASE}/posts/${postId}/like`, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${token}`
        }
      });

      const data = await res.json();

      if (res.ok) {
        document.getElementById(`likes-${postId}`).textContent = data.likes_count;
      } else {
        alert(data.detail || "Could not like post");
      }
    }

    async function unlikePost(postId) {
      const token = getToken();
      if (!token) {
        alert("Please log in first");
        return;
      }

      const res = await fetch(`${API_BASE}/posts/${postId}/like`, {
        method: "DELETE",
        headers: {
          "Authorization": `Bearer ${token}`
        }
      });

      const data = await res.json();

      if (res.ok) {
        document.getElementById(`likes-${postId}`).textContent = data.likes_count;
      } else {
        alert(data.detail || "Could not unlike post");
      }
    }

    async function addComment(postId) {
      const token = getToken();
      if (!token) {
        alert("Please log in first");
        return;
      }

      const content = document.getElementById(`comment-${postId}`).value;

      const res = await fetch(`${API_BASE}/posts/${postId}/comments`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify({ content })
      });

      const data = await res.json();

      if (res.ok) {
        document.getElementById(`comment-${postId}`).value = "";
        loadComments(postId);
      } else {
        alert(data.detail || "Could not add comment");
      }
    }

    async function loadComments(postId) {
      const res = await fetch(`${API_BASE}/posts/${postId}/comments`);
      const comments = await res.json();

      const box = document.getElementById(`comments-${postId}`);
      box.innerHTML = "<h4>Comments</h4>";

      if (!Array.isArray(comments) || comments.length === 0) {
        box.innerHTML += "<p>No comments yet.</p>";
        return;
      }

      comments.forEach(comment => {
        const c = document.createElement("div");
        c.className = "comment";
        c.innerHTML = `
          <strong>${comment.author_name}</strong> (${comment.author_role})<br>
          ${comment.content}
        `;
        box.appendChild(c);
      });
    }

    async function loadProfile(role, userId) {
      const res = await fetch(`${API_BASE}/profiles/${role}/${userId}`);
      const data = await res.json();

      document.getElementById("profileBox").textContent =
        JSON.stringify(data, null, 2);
    }

    showToken();
  </script>
</body>
</html>
