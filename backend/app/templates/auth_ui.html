<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Auth UI</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 30px auto; }
    .row { margin: 10px 0; }
    label { display: inline-block; width: 190px; vertical-align: top; }
    input, select, textarea { padding: 8px; width: 360px; }
    button { padding: 10px 14px; cursor: pointer; margin-right: 8px; }
    .box { border: 1px solid #ddd; padding: 16px; border-radius: 10px; }
    pre { background: #f6f6f6; padding: 12px; border-radius: 8px; overflow:auto; }
    .small { color: #666; font-size: 13px; }
    .tokenbox { width: 360px; height: 70px; }
    hr { border: none; border-top: 1px solid #eee; margin: 14px 0; }
  </style>
</head>
<body>
  <h1>Login / Registration</h1>
  <p class="small">Choose role + action. After login, token is saved automatically in localStorage.</p>

  <div class="box">
    <div class="row">
      <label>Role</label>
      <select id="role" onchange="renderFields()">
        <option value="farmer">Farmer</option>
        <option value="researcher">Researcher</option>
      </select>
    </div>

    <div class="row">
      <label>Action</label>
      <select id="action" onchange="renderFields()">
        <option value="login">Login</option>
        <option value="register">Register</option>
      </select>
    </div>

    <hr>

    <div id="fields"></div>

    <div class="row">
      <label></label>
      <button onclick="submitForm()">Submit</button>
    </div>

    <hr>

    <h3>Saved JWT Token</h3>
    <div class="row">
      <label>Token (localStorage)</label>
      <textarea id="token" class="tokenbox" readonly></textarea>
    </div>
    <div class="row">
      <label></label>
      <button onclick="copyToken()">Copy token</button>
      <button onclick="clearToken()">Clear token</button>
      <button onclick="callMe()">Call /auth/me</button>
    </div>
    <p class="small">
      Tip: Login will auto-save the token. Register does not.
    </p>
  </div>

  <h3>Response</h3>
  <pre id="out">{}</pre>

<script>
const TOKEN_KEY = "jwt_token";

function inputRow(id, labelText, type="text", placeholder="") {
  return `
    <div class="row">
      <label for="${id}">${labelText}</label>
      <input id="${id}" type="${type}" placeholder="${placeholder}" />
    </div>
  `;
}

function renderFields() {
  const role = document.getElementById("role").value;
  const action = document.getElementById("action").value;

  let html = "";

  if (role === "farmer" && action === "login") {
    html += inputRow("email", "Email", "email", "farmer@email.com");
    html += inputRow("password", "Password", "password", "Password");
  }

  if (role === "farmer" && action === "register") {
    html += inputRow("first_name", "First name", "text", "First name");
    html += inputRow("last_name", "Last name", "text", "Last name");
    html += inputRow("email", "Email", "email", "farmer@email.com");
    html += `
    <div class="row">
      <label for="experience">Experience</label>
      <select id="experience">
        <option value="0-1 years">0-1 years</option>
        <option value="1-3 years">1-3 years</option>
        <option value="3-5 years">3-5 years</option>
        <option value="5+ years">5+ years</option>
      </select>
    </div>
  `;
    html += inputRow("location", "Location", "text", "City / Region");
    html += inputRow("password", "Password", "password", "Strong password");
  }

  if (role === "researcher" && action === "login") {
    html += inputRow("email", "Email", "email", "researcher@email.com");
    html += inputRow("org_code", "Organization code", "text", "4 digits (e.g., 1234)");
    html += inputRow("password", "Password", "password", "Password");
  }

  if (role === "researcher" && action === "register") {
    html += inputRow("email", "Email", "email", "researcher@email.com");
    html += inputRow("first_name", "First name", "text", "First name");
    html += inputRow("last_name", "Last name", "text", "Last name");
    html += inputRow("org_code", "Organization code", "text", "4 digits (e.g., 1234)");
    // connection_end must be date input
    html += inputRow("connection_end", "Connection end date", "date", "");
    html += inputRow("password", "Password", "password", "Strong password");
  }

  document.getElementById("fields").innerHTML = html;
}

function getValue(id) {
  const el = document.getElementById(id);
  return el ? el.value : undefined;
}

function setOutput(obj) {
  document.getElementById("out").textContent = JSON.stringify(obj, null, 2);
}

function loadTokenToUI() {
  document.getElementById("token").value = localStorage.getItem(TOKEN_KEY) || "";
}

function saveToken(token) {
  localStorage.setItem(TOKEN_KEY, token);
  loadTokenToUI();
}

function clearToken() {
  localStorage.removeItem(TOKEN_KEY);
  loadTokenToUI();
  setOutput({ ok: true, message: "Token cleared" });
}

async function copyToken() {
  const token = localStorage.getItem(TOKEN_KEY) || "";
  if (!token) {
    setOutput({ ok: false, message: "No token to copy" });
    return;
  }
  await navigator.clipboard.writeText(token);
  setOutput({ ok: true, message: "Token copied to clipboard" });
}

async function submitForm() {
  const role = document.getElementById("role").value;
  const action = document.getElementById("action").value;

  let url = "";
  if (role === "farmer" && action === "login") url = "/auth/farmers/login";
  if (role === "farmer" && action === "register") url = "/auth/farmers/register";
  if (role === "researcher" && action === "login") url = "/auth/researchers/login";
  if (role === "researcher" && action === "register") url = "/auth/researchers/register";

  let payload = {};

  if (role === "farmer" && action === "login") {
    payload = { email: getValue("email"), password: getValue("password") };
  }
  if (role === "farmer" && action === "register") {
    payload = {
      first_name: getValue("first_name"),
      last_name: getValue("last_name"),
      email: getValue("email"),
      experience: getValue("experience"),
      location: getValue("location"),
      password: getValue("password"),
    };
  }
  if (role === "researcher" && action === "login") {
    payload = {
      email: getValue("email"),
      org_code: getValue("org_code"),
      password: getValue("password"),
    };
  }
  if (role === "researcher" && action === "register") {
    payload = {
      email: getValue("email"),
      first_name: getValue("first_name"),
      last_name: getValue("last_name"),
      org_code: getValue("org_code"),
      connection_end: getValue("connection_end"),
      password: getValue("password"),
    };
  }

  try {
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });

    let data;
    try { data = await res.json(); }
    catch { data = { detail: "No JSON response" }; }

    // Auto-save token after LOGIN ✅
    if (res.ok && action === "login" && data.access_token) {
      saveToken(data.access_token);
    }

    setOutput({ status: res.status, endpoint: url, data });
  } catch (err) {
    setOutput({ error: String(err) });
  }
}


async function callMe() {
  const token = localStorage.getItem(TOKEN_KEY);
  if (!token) {
    setOutput({ ok: false, message: "No token saved. Login first." });
    return;
  }

  try {
    const res = await fetch("/auth/me", {
      headers: { "Authorization": "Bearer " + token }
    });
    const data = await res.json();
    setOutput({ status: res.status, endpoint: "/auth/me", data });
  } catch (err) {
    setOutput({ error: String(err) });
  }
}

renderFields();
loadTokenToUI();
</script>
</body>
</html>
